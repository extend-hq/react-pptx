name: PowerPoint oracle

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: powerpoint-oracle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compare:
    runs-on: self-hosted
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '24'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm powerpoint-oracle:validate
      - run: pnpm powerpoint-oracle:compare
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: powerpoint-oracle-results
          path: .powerpoint-oracle/results
